{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}?v=6">

<div class="wrapper">
    <div class="form-container">

        <h2>Student Detail</h2>

        <p><strong>Name:</strong> {{ object.name }}</p>
        <p><strong>Email:</strong> {{ object.email }}</p>
        <p><strong>Age:</strong> {{ object.age }}</p>
        <p><strong>Roll Number:</strong> {{ object.roll_no }}</p>

        {% if object.profile_pic %}
            <p>
                <img src="{{ object.profile_pic.url }}" width="100">
            </p>
        {% endif %}

        <div class="actions">
            <a href="/student/update/{{object.id}}">Edit</a>
            <a href="/student/delete/{{object.id}}">Delete</a>
        </div>

    </div>
</div>
